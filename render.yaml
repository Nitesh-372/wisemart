services:
  - type: web
    name: wisemart-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-frontend-url.example
      - key: DATABASE_URL
        value: sqlite:///wisemart.db
